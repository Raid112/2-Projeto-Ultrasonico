<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ultrasonico</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #e94560;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
        }
        .card-full { grid-column: 1 / -1; }
        .distancia-atual {
            text-align: center;
            font-size: 72px;
            font-weight: bold;
            padding: 20px;
        }
        .distancia-atual span { font-size: 28px; color: #aaa; }
        .status {
            text-align: center;
            padding: 10px;
        }
        .status-item {
            display: inline-block;
            margin: 0 15px;
            font-size: 14px;
        }
        .dot {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .dot-green { background: #4ecca3; }
        .dot-red { background: #e94560; }
        .dot-gray { background: #666; }
        #alertas {
            max-height: 200px;
            overflow-y: auto;
            font-size: 14px;
        }
        #alertas p {
            padding: 4px 0;
            border-bottom: 1px solid #1a1a2e;
        }
        .alerta-time { color: #4ecca3; margin-right: 8px; }
        .sem-dados { color: #666; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <h1>Sensor Ultrasonico — Dashboard</h1>

    <div class="grid">
        <!-- Distancia atual -->
        <div class="card">
            <div class="distancia-atual" id="dist-valor">--</div>
            <div style="text-align:center; color:#aaa;">Distancia atual</div>
        </div>

        <!-- Status -->
        <div class="card">
            <h3 style="margin-bottom:15px;">Status</h3>
            <div class="status">
                <div class="status-item">
                    <span class="dot" id="dot-conexao"></span>
                    <span id="status-conexao">Aguardando dados...</span>
                </div>
            </div>
            <div class="status" style="margin-top:10px;">
                <div class="status-item">
                    Leituras: <strong id="total-leituras">0</strong>
                </div>
                <div class="status-item">
                    Alertas: <strong id="total-alertas">0</strong>
                </div>
            </div>
            <h3 style="margin-top:20px; margin-bottom:10px;">Alertas WhatsApp</h3>
            <div id="alertas">
                <p class="sem-dados">Nenhum alerta ainda</p>
            </div>
        </div>

        <!-- Grafico -->
        <div class="card card-full">
            <canvas id="grafico"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('grafico').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Distancia (cm)',
                    data: [],
                    borderColor: '#e94560',
                    backgroundColor: 'rgba(233, 69, 96, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0,
                    borderWidth: 2,
                }]
            },
            options: {
                responsive: true,
                animation: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 200,
                        grid: { color: '#1a1a2e' },
                        ticks: { color: '#aaa' },
                        title: { display: true, text: 'cm', color: '#aaa' }
                    },
                    x: {
                        grid: { color: '#1a1a2e' },
                        ticks: {
                            color: '#aaa',
                            maxTicksLimit: 10,
                        }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#eee' } }
                }
            }
        });

        let ultimoTotal = 0;

        async function atualizar() {
            try {
                const resp = await fetch('/api/dados');
                const dados = await resp.json();

                // Distancia atual
                const distEl = document.getElementById('dist-valor');
                if (dados.historico.length > 0) {
                    const ultimo = dados.historico[dados.historico.length - 1];
                    const dist = ultimo.dist;
                    if (dist < 0) {
                        distEl.innerHTML = '--<span> cm</span>';
                    } else {
                        distEl.innerHTML = dist + '<span> cm</span>';
                    }

                    // Cor baseada na distancia
                    if (dist < 0) distEl.style.color = '#4a9eff';
                    else if (dist < 20) distEl.style.color = '#e94560';
                    else if (dist < 60) distEl.style.color = '#f0a500';
                    else distEl.style.color = '#4ecca3';
                }

                // Grafico
                chart.data.labels = dados.historico.map(d => d.t);
                chart.data.datasets[0].data = dados.historico.map(d => d.dist >= 0 ? d.dist : null);
                chart.update();

                // Status conexao
                const dotEl = document.getElementById('dot-conexao');
                const statusEl = document.getElementById('status-conexao');
                if (dados.historico.length > ultimoTotal) {
                    dotEl.className = 'dot dot-green';
                    statusEl.textContent = 'Recebendo dados';
                } else if (dados.historico.length > 0) {
                    dotEl.className = 'dot dot-gray';
                    statusEl.textContent = 'Sem dados novos';
                }
                ultimoTotal = dados.historico.length;

                // Contadores
                document.getElementById('total-leituras').textContent = dados.historico.length;
                document.getElementById('total-alertas').textContent = dados.alertas.length;

                // Alertas
                const alertasEl = document.getElementById('alertas');
                if (dados.alertas.length > 0) {
                    alertasEl.innerHTML = dados.alertas
                        .slice().reverse()
                        .map(a => `<p><span class="alerta-time">${a.t}</span>Objeto a ${a.dist} cm</p>`)
                        .join('');
                }

            } catch (e) {
                document.getElementById('dot-conexao').className = 'dot dot-red';
                document.getElementById('status-conexao').textContent = 'Erro de conexao';
            }
        }

        setInterval(atualizar, 1000);
        atualizar();
    </script>
</body>
</html>
